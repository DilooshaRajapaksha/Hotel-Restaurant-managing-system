spring.application.name=backend
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/Hotel_System?createDatabaseIfNotexist=true&serverTimezone=UTC
spring.datasource.username=root
#spring.datasource.password=Diloo2004
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

app.upload.dir=${user.dir}/uploads

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

logging.level.org.springframework.jdbc=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.com.hotel=DEBUG

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=yourgmail@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true